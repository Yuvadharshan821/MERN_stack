<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forms</title>
    <link rel="stylesheet" href="../CSS/position.css">

</head>
<body>
    <div>
        <header>

        </header>
        <main>
            <form>
                <label>Name:</label> <input type="text" name="name" required placeholder="Enter your name"><br><br>
                <label>Email:</label> <input type="email" name="email" required placeholder="Enter your email"><br><br>
                <label>Password:</label> <input type="password" name="password" required placeholder="Enter your password"><br><br>
                <label>Number:</label> <input type="number" name="number" required placeholder="Enter your number"><br><br>
                <label>DOB:</label> <input type="date" name="dob" required><br><br>
                <label>Gender:</label> <input type="radio" name="gender" value="male" required> Male
                <input type="radio" name="gender" value="female" required>  Female      
                <input type="radio" name="gender" value="other" required> Other<br><br>
                <label>Qualification:</label><input type="checkbox">SSC
                <input type="checkbox">PUC
                <input type="checkbox">Diploma
                <input type="checkbox">UG
                <input type="checkbox">PG
                <input type="checkbox">Doctrate<br><br>
                <label>Image:</label><input type="file" name="image" required><br><br>
            </form>
        </main>
        <footer>
            <button type="submit">Submit</button>
            <button type="reset">Reset</button>
        </footer>

    </div>
</body>
</html>
